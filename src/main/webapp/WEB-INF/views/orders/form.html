<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${mode == 'edit'} ? 'Cập nhật đơn hàng' : 'Thêm mới đơn hàng'"></title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .grid { display: grid; grid-template-columns: 200px 1fr; gap: 10px 14px; max-width: 820px; }
        label { padding-top: 8px; }
        input, select, textarea { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        textarea { min-height: 110px; resize: vertical; }
        .error { color: #b00020; margin-top: 4px; font-size: 13px; }
        .row { margin-bottom: 10px; }
        .actions { display: flex; gap: 10px; margin-top: 16px; }
        button, a.button { border: 1px solid #ccc; background: #fff; padding: 8px 12px; border-radius: 6px; cursor: pointer; text-decoration: none; color: #111; }
        button.primary { background: #0b5fff; border-color: #0b5fff; color: #fff; }
        .header { display:flex; align-items:center; justify-content:space-between; gap: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h2 th:text="${mode == 'edit'} ? 'Cập nhật đơn hàng' : 'Thêm mới đơn hàng'"></h2>
    <a class="button" th:href="@{/orders}">Quay lại</a>
</div>

<form method="post"
      th:action="${mode == 'edit'} ? @{/orders/{id}(id=${orderId})} : @{/orders}"
      th:object="${orderForm}">

    <div class="grid">
        <div class="row">
            <label for="orderCode">Mã đơn hàng</label>
        </div>
        <div class="row">
            <input id="orderCode" type="text" th:field="*{orderCode}" placeholder="VD: ABC12345">
            <div class="error" th:if="${#fields.hasErrors('orderCode')}" th:errors="*{orderCode}"></div>
        </div>

        <div class="row">
            <label for="customerName">Tên khách hàng</label>
        </div>
        <div class="row">
            <input id="customerName" type="text" th:field="*{customerName}" placeholder="Nhập tên khách hàng">
            <div class="error" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></div>
        </div>

        <div class="row">
            <label for="orderDate">Ngày đặt</label>
        </div>
        <div class="row">
            <input id="orderDate" type="date" th:field="*{orderDate}">
            <div class="error" th:if="${#fields.hasErrors('orderDate')}" th:errors="*{orderDate}"></div>
        </div>

        <div class="row">
            <label for="totalAmount">Tổng tiền (VNĐ)</label>
        </div>
        <div class="row">
            <input id="totalAmount" type="number" step="0.01" min="0" th:field="*{totalAmount}" placeholder="0 - 1000000000">
            <div class="error" th:if="${#fields.hasErrors('totalAmount')}" th:errors="*{totalAmount}"></div>
        </div>

        <div class="row">
            <label for="status">Trạng thái</label>
        </div>
        <div class="row">
            <select id="status" th:field="*{status}">
                <option value="" disabled>-- Chọn trạng thái --</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
        </div>

        <div class="row">
            <label for="note">Ghi chú</label>
        </div>
        <div class="row">
            <textarea id="note" th:field="*{note}" placeholder="Tối đa 300 ký tự"></textarea>
            <div class="error" th:if="${#fields.hasErrors('note')}" th:errors="*{note}"></div>
        </div>
    </div>

    <div class="actions">
        <button class="primary" type="submit" th:text="${mode == 'edit'} ? 'Lưu thay đổi' : 'Thêm mới'"></button>
        <a class="button" th:href="@{/orders}">Hủy</a>
    </div>
</form>

</body>
</html>
